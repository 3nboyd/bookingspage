<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noah Boyd | Song Requests</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <div class="page-shell page-shell--narrow">
    <header class="hero">
      <a class="back-link" href="../index.html">Back to bookings and contact</a>
      <div class="hero__content">
        <p class="hero__eyebrow">Direct Song Request</p>
        <h1 class="hero__title">Song Requests!</h1>
      </div>
    </header>

    <main class="content content--tight">
      <section class="request-panel">
        <form id="song-request-form" class="request-form" method="post" target="song-request-target" novalidate>
          <div class="form-field">
            <label class="field-label" for="song-request">Song Name &amp; Artist</label>
            <input
              id="song-request"
              class="text-input"
              type="text"
              name="songRequest"
              placeholder="Example: Levels - Avicii"
              autocomplete="off"
              maxlength="160"
              required
            >
          </div>

          <fieldset class="form-field genre-field">
            <legend class="field-label">Pick Your Favorite Genre!</legend>
            <div class="genre-grid">
              <label class="genre-option">
                <input type="radio" name="genre" value="Pop">
                <span>Pop</span>
              </label>
              <label class="genre-option">
                <input type="radio" name="genre" value="House">
                <span>House</span>
              </label>
              <label class="genre-option">
                <input type="radio" name="genre" value="RNB">
                <span>R&amp;B</span>
              </label>
              <label class="genre-option">
                <input type="radio" name="genre" value="Latin">
                <span>Latin</span>
              </label>
              <label class="genre-option">
                <input type="radio" name="genre" value="Rock">
                <span>Rock</span>
              </label>
              <label class="genre-option">
                <input type="radio" name="genre" value="Country">
                <span>Country</span>
              </label>
            </div>
          </fieldset>

          <div class="honeypot" aria-hidden="true">
            <label for="website">Website</label>
            <input id="website" type="text" name="website" tabindex="-1" autocomplete="off">
          </div>

          <div class="request-checklist">
            <p class="request-checklist__title">Before you submit, ask yourself:</p>
            <ul class="request-checklist__list">
              <li>Is this song relatively popular?</li>
              <li>Would people actually dance to this?</li>
              <li><strong>If not, I'M NOT GOING TO PLAY IT.</strong></li>
            </ul>
          </div>

          <button id="song-request-submit" class="cta" type="submit">Send Song Request</button>
          <p id="song-request-status" class="form-status" role="status" aria-live="polite"></p>
        </form>
      </section>

      <section class="section">
        <a class="ghost-btn ghost-btn--link" href="../index.html">Need bookings or contact info?</a>
      </section>
    </main>

    <iframe
      id="song-request-target"
      class="visually-hidden-frame"
      name="song-request-target"
      title="Song request submission target"
    ></iframe>
  </div>

  <script src="../site-config.js"></script>
  <script src="../script.js"></script>
</body>
</html>
